<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d14"/>
      <stop offset="100%" stop-color="#13131f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Left lobe -->
  <path d="M 16 5.5 C 14.2 4.5,11.5 4.4,9.4 5.4 C 7.1 6.5,5.5 8.6,5 11 C 4.4 13.5,5 16.2,6.4 18.2 C 7.8 20.2,9.8 21.2,12 21.5 C 13.4 21.7,15 21.5,16 20.8 Z"
    fill="#15152a" stroke="url(#accent)" stroke-width="1"/>

  <!-- Right lobe -->
  <path d="M 16 5.5 C 17.8 4.5,20.5 4.4,22.6 5.4 C 24.9 6.5,26.5 8.6,27 11 C 27.6 13.5,27 16.2,25.6 18.2 C 24.2 20.2,22.2 21.2,20 21.5 C 18.6 21.7,17 21.5,16 20.8 Z"
    fill="#15152a" stroke="url(#accent)" stroke-width="1"/>

  <!-- Circuit lines inside left lobe -->
  <line x1="7"  y1="11" x2="15" y2="11" stroke="#6366f1" stroke-width="0.8" opacity="0.7"/>
  <line x1="6"  y1="15" x2="15" y2="15" stroke="#6366f1" stroke-width="0.8" opacity="0.7"/>
  <line x1="9"  y1="8"  x2="9"  y2="21" stroke="#818cf8" stroke-width="0.8" opacity="0.6"/>
  <line x1="12" y1="7"  x2="12" y2="21" stroke="#818cf8" stroke-width="0.8" opacity="0.6"/>

  <!-- Circuit pad nodes, left -->
  <rect x="8"  y="10" width="2" height="2" rx="0.4" fill="#818cf8"/>
  <rect x="11" y="10" width="2" height="2" rx="0.4" fill="#a78bfa"/>
  <rect x="8"  y="14" width="2" height="2" rx="0.4" fill="#a78bfa"/>
  <rect x="11" y="14" width="2" height="2" rx="0.4" fill="#818cf8"/>

  <!-- Circuit lines inside right lobe -->
  <line x1="17" y1="11" x2="25" y2="11" stroke="#6366f1" stroke-width="0.8" opacity="0.7"/>
  <line x1="17" y1="15" x2="26" y2="15" stroke="#6366f1" stroke-width="0.8" opacity="0.7"/>
  <line x1="20" y1="7"  x2="20" y2="21" stroke="#818cf8" stroke-width="0.8" opacity="0.6"/>
  <line x1="23" y1="8"  x2="23" y2="21" stroke="#818cf8" stroke-width="0.8" opacity="0.6"/>

  <!-- Circuit pad nodes, right -->
  <rect x="19" y="10" width="2" height="2" rx="0.4" fill="#a78bfa"/>
  <rect x="22" y="10" width="2" height="2" rx="0.4" fill="#818cf8"/>
  <rect x="19" y="14" width="2" height="2" rx="0.4" fill="#818cf8"/>
  <rect x="22" y="14" width="2" height="2" rx="0.4" fill="#a78bfa"/>

  <!-- Center fissure -->
  <line x1="16" y1="6" x2="16" y2="21" stroke="#a78bfa" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.6"/>

  <!-- Center glow node -->
  <circle cx="16" cy="13" r="1.5" fill="#a78bfa" opacity="0.9"/>

  <!-- "AI" text at bottom -->
  <text x="16" y="29.5" text-anchor="middle"
    font-family="'Segoe UI', -apple-system, sans-serif"
    font-size="7" font-weight="800" letter-spacing="0.5"
    fill="url(#accent)">AI/ML</text>
</svg>
